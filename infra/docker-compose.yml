services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: review_bot
      POSTGRES_PASSWORD: review_bot_dev
      POSTGRES_DB: review_bot
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U review_bot -d review_bot"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
